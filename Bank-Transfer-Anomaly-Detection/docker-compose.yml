services:
  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  ui:
    environment:
      - API_URL=http://api:8000/predict
    build: .
    command: streamlit run ui/main.py --server.port 8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api